version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(ci)
      include: scope
    labels:
      - dependencies
      - ci
    # Group every action bump (major, minor, patch) into one PR per cycle.
    # Reduces churn: one CI run, one merge click. CI's full matrix is
    # the safety net.
    groups:
      github-actions:
        patterns:
          - "*"
